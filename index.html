<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV Gabriel Frățilescu - RPG Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Roboto:wght@400;700&display=swap');

        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a2e;
            color: #fff;
            font-family: 'Roboto', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #game-wrapper {
            position: relative;
            width: 800px;
            height: 600px;
            overflow: hidden;
            border: 4px solid #fff;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            background-color: #2b2b2b;
        }

        /* The 2.5D Isometric Map */
        #map {
            position: absolute;
            width: 2000px;
            height: 2000px;
            background: 
                linear-gradient(rgba(46, 139, 87, 0.8), rgba(46, 139, 87, 0.8)),
                radial-gradient(circle at 50% 50%, #4a7c59, #2d4c37);
            background-size: 100px 100px;
            background-image: 
                linear-gradient(to right, rgba(255,255,255,0.1) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255,255,255,0.1) 1px, transparent 1px);
            transform-style: preserve-3d;
            transform: rotateX(60deg) rotateZ(-45deg);
            top: -700px;
            left: -600px;
            transition: transform 0.1s;
        }

        /* Entities on the map (billboarding effect to stand straight up) */
        .entity {
            position: absolute;
            transform-origin: bottom center;
            transform: rotateZ(45deg) rotateX(-60deg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
        }

        .building-model {
            width: 60px;
            height: 80px;
            background-color: #8b5a2b;
            border: 3px solid #5c3a21;
            border-radius: 5px 5px 0 0;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
            position: relative;
        }

        .building-model::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 20px;
            width: 20px;
            height: 30px;
            background: #3e2312;
            border-radius: 3px 3px 0 0;
        }

        .building-label {
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            color: #fff;
            text-shadow: 2px 2px 0 #000;
            margin-bottom: 5px;
            text-align: center;
            white-space: nowrap;
        }

        #player {
            width: 30px;
            height: 40px;
            background-color: #e74c3c;
            border: 2px solid #c0392b;
            border-radius: 15px 15px 5px 5px;
            z-index: 100;
            transition: transform 0.1s;
        }

        /* UI Overlays */
        #instructions {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            padding: 10px;
            border-radius: 5px;
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            color: #ffd700;
            z-index: 200;
        }

        #modal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 80%;
            max-height: 80%;
            background: rgba(20, 20, 40, 0.95);
            border: 4px solid #4facfe;
            border-radius: 10px;
            padding: 20px;
            z-index: 300;
            overflow-y: auto;
            opacity: 0;
            transition: all 0.3s ease-in-out;
            box-shadow: 0 0 30px rgba(79, 172, 254, 0.5);
        }

        #modal.active {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }

        #modal h2 {
            font-family: 'Press Start 2P', cursive;
            font-size: 16px;
            color: #4facfe;
            margin-top: 0;
            border-bottom: 2px solid #4facfe;
            padding-bottom: 10px;
        }

        #modal p, #modal li {
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 10px;
        }
        
        .cite {
            color: #888;
            font-size: 0.8em;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div id="game-wrapper">
        <div id="instructions">
            Utilizează W A S D sau Săgețile <br><br>
            pentru a explora harta CV-ului!
        </div>

        <div id="map">
            <!-- Entities injected via JS -->
            <div id="player-container" class="entity" style="left: 1000px; top: 1000px;">
                <div class="building-label">Gabriel</div>
                <div id="player"></div>
            </div>
        </div>

        <div id="modal">
            <h2 id="modal-title">Titlu</h2>
            <div id="modal-content">Conținut</div>
        </div>
    </div>

    <script>
        // --- DATA EXTRACTED FROM CV ---
        const cvData = {
            intro: {
                title: "Informații Personale & Profil",
                content: `
                    <p><b>Nume:</b> Gabriel Frățilescu <span class="cite">[cite: 1]</span></p>
                    <p><b>Contact:</b> fr.info2903@gmail.com | 0774625054 | str. 1 Mai, nr. 92, Petrești <span class="cite">[cite: 1]</span></p>
                    <p><b>Despre mine:</b> Student la Facultatea de Automatică și Ingineria Sistemelor - UTCN, pasionat de programare. Cunoștințe de bază în dezvoltarea algoritmilor AI și sisteme embedded. <span class="cite">[cite: 1]</span></p>
                    <p>Proactiv, determinat, adaptabil, flexibil și colaborare bună în echipe. <span class="cite">[cite: 1]</span></p>
                `
            },
            skills: {
                title: "Abilități & Limbi Străine",
                content: `
                    <p><b>Tehnologii:</b> Python, Matlab, PyTorch, C#, AutoCAD <span class="cite">[cite: 1]</span></p>
                    <p><b>Limbi străine:</b> Engleză (Certificat Cambridge C1) <span class="cite">[cite: 1]</span></p>
                    <p><b>Permis de conducere:</b> Categoria B <span class="cite">[cite: 1]</span></p>
                `
            },
            experience: {
                title: "Experiență de Lucru",
                content: `
                    <ul>
                        <li><b>Meditator (august 2025 - Prezent):</b> Ofer meditații elevilor de liceu și gimnaziu la matematică și informatică pentru examenele naționale și admitere la UTCN. <span class="cite">[cite: 1]</span></li>
                        <li><b>Proiectul de cercetare OPTIMDRUG (noiembrie 2025 - Prezent):</b> Studii bazate pe optimizarea și analiza algoritmilor de control a ratei de infuzie intravenoasă (propofol/remifentanil) pentru inducția stărilor de hipnoză. <span class="cite">[cite: 1]</span></li>
                        <li><b>Lucrător Comercial, Mobel Sig S.R.L (iulie 2022 - august 2022):</b> Participarea la recepția mărfurilor, aprovizionare, procesare plăți, montare/demontare mobilier. <span class="cite">[cite: 1]</span></li>
                    </ul>
                `
            },
            awards: {
                title: "Premii & Hackathoane",
                content: `
                    <ul>
                        <li><b>Premiul de cercetare, Competiția IOT Student Challenge (mai 2026):</b> Dezvoltarea proiectului de dozare autonomă de anestezie, incluzând studii de piață și costuri. <span class="cite">[cite: 1]</span></li>
                        <li><b>Premiul 1, Hackatonul Polihack (aprilie 2026):</b> Prototiparea unui algoritm AI cu PyTorch pentru dozarea autonomă a anestezicelor, validat cu un simulator MATLAB și date reale. <span class="cite">[cite: 1]</span></li>
                        <li><b>Premiul 2, Hackthonul Polihack (decembrie 2025):</b> Dezvoltarea unui prototip de cameră de bord inteligentă cu Computer Vision (YOLO în Python) pentru mașini vechi (detecție pietoni, semne, alerte de siguranță). <span class="cite">[cite: 1]</span></li>
                        <li><b>Medalie de Argint, Olimpiada De Creativitate Științifică (mai 2024):</b> Simulare Python pentru transmisia de energie de la un satelit circumselenar la o bază lunară prin microunde sau laser. <span class="cite">[cite: 1]</span></li>
                        <li><b>Premiul 2 Național, IWD Hackathon - TeensinAI (sept 2023 - iun 2024):</b> Dezvoltarea unui algoritm care preia o întrebare de la utilizator și indică locul în document unde se află răspunsul. <span class="cite">[cite: 1]</span></li>
                    </ul>
                `
            },
            education: {
                title: "Educație & Voluntariat",
                content: `
                    <ul>
                        <li><b>Licență:</b> Automatică și Ingineria Sistemelor, UTCN (octombrie 2025 - Prezent) <span class="cite">[cite: 1]</span></li>
                        <li><b>Bacalaureat:</b> Profil Mate-Info, Colegiul Național „Lucian Blaga" Sebeș (Media 9.65, sept 2021 - iun 2025) <span class="cite">[cite: 1]</span></li>
                        <li><b>Voluntariat:</b> Team Leader Echipa de Robotică, Star_B1T0 Robotics (sept 2021 - iun 2025). Coordonarea echipei, recrutare, departament software, atragere sponsorizări (Star Assembly Sebeș). <span class="cite">[cite: 1]</span></li>
                        <li><b>Voluntariat:</b> Progres & Protect (2023) - Organizarea și coordonarea unor activități de grup și programe de mentorat pentru elevi de liceu. <span class="cite">[cite: 1]</span></li>
                    </ul>
                `
            }
        };

        // --- GAME LOGIC ---
        const map = document.getElementById('map');
        const playerElement = document.getElementById('player-container');
        const modal = document.getElementById('modal');
        const modalTitle = document.getElementById('modal-title');
        const modalContent = document.getElementById('modal-content');

        // Player State
        let player = {
            x: 1000,
            y: 1000,
            speed: 5,
            width: 30,
            height: 40
        };

        // Points of Interest (Buildings)
        const buildings = [
            { id: 'intro', x: 1000, y: 800, label: "Profil & Contact", color: "#3498db" },
            { id: 'skills', x: 800, y: 1000, label: "Abilități Tehnice", color: "#9b59b6" },
            { id: 'experience', x: 1200, y: 1000, label: "Experiență", color: "#e67e22" },
            { id: 'awards', x: 1000, y: 1200, label: "Premii & AI", color: "#f1c40f" },
            { id: 'education', x: 1150, y: 850, label: "Educație", color: "#2ecc71" }
        ];

        // Render Buildings on Map
        buildings.forEach(b => {
            const el = document.createElement('div');
            el.className = 'entity';
            el.style.left = b.x + 'px';
            el.style.top = b.y + 'px';
            
            el.innerHTML = `
                <div class="building-label">${b.label}</div>
                <div class="building-model" style="background-color: ${b.color};"></div>
            `;
            map.appendChild(el);
            b.element = el;
        });

        // Input Tracking
        const keys = { w: false, a: false, s: false, d: false, ArrowUp: false, ArrowLeft: false, ArrowDown: false, ArrowRight: false };

        window.addEventListener('keydown', (e) => {
            if (keys.hasOwnProperty(e.key)) keys[e.key] = true;
            if (e.key === 'Escape') closeModal(); // Close modal on Esc
        });

        window.addEventListener('keyup', (e) => {
            if (keys.hasOwnProperty(e.key)) keys[e.key] = false;
        });

        let activeModal = null;

        function checkCollisions() {
            let collisionFound = false;

            for (const b of buildings) {
                // Simple distance-based collision detection
                const dist = Math.sqrt(Math.pow(player.x - b.x, 2) + Math.pow(player.y - b.y, 2));
                
                if (dist < 60) {
                    collisionFound = true;
                    if (activeModal !== b.id) {
                        openModal(b.id);
                    }
                    break;
                }
            }

            if (!collisionFound && activeModal !== null) {
                closeModal();
            }
        }

        function openModal(id) {
            activeModal = id;
            modalTitle.innerText = cvData[id].title;
            modalContent.innerHTML = cvData[id].content;
            modal.classList.add('active');
        }

        function closeModal() {
            activeModal = null;
            modal.classList.remove('active');
        }

        function update() {
            let dx = 0;
            let dy = 0;

            if (keys.w || keys.ArrowUp) dy -= player.speed;
            if (keys.s || keys.ArrowDown) dy += player.speed;
            if (keys.a || keys.ArrowLeft) dx -= player.speed;
            if (keys.d || keys.ArrowRight) dx += player.speed;

            // Normalize diagonal movement speed
            if (dx !== 0 && dy !== 0) {
                const length = Math.sqrt(dx * dx + dy * dy);
                dx = (dx / length) * player.speed;
                dy = (dy / length) * player.speed;
            }

            // Boundary constraints (keep player on the map)
            if (player.x + dx > 100 && player.x + dx < 1900) player.x += dx;
            if (player.y + dy > 100 && player.y + dy < 1900) player.y += dy;

            // Apply positions
            playerElement.style.left = player.x + 'px';
            playerElement.style.top = player.y + 'px';

            // Center camera on player (compensating for the isometric transform offsets)
            // The map is 2000x2000. Viewport is 800x600.
            const targetX = -player.x + 400; 
            const targetY = -player.y + 300;
            map.style.transform = `rotateX(60deg) rotateZ(-45deg) translate3d(${targetX}px, ${targetY}px, 0)`;

            checkCollisions();

            requestAnimationFrame(update);
        }

        // Start Game Loop
        update();
    </script>
</body>
</html>
